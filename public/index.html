<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="QA Portfolio - Tạ Đăng Thảo | Junior Tester | Game Theme" />
    <title>Tạ Đăng Thảo - Junior Tester Portfolio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Courier New', 'Arial', sans-serif;
        background: #0a0e27;
        color: #fff;
      }
      #root {
        width: 100%;
        min-height: 100vh;
      }
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1f3a;
      }
      ::-webkit-scrollbar-thumb {
        background: #00ff88;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00cc6f;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
